# Video2Tasks configuration for Gemini 3 Flash runs

datasets:
  - root: "./data"
    subset: "youcook2_single_LQDP3xm8aRk"
  - root: "./data"
    subset: "youcook2_single_OWtnI3m_p8g"
  - root: "./data"
    subset: "youcook2_single_PQ97HXmsFR0"
  - root: "./data"
    subset: "youcook2_single_TMpt_41UTOk"
  - root: "./data"
    subset: "youcook2_single"

run:
  base_dir: "./runs"
  run_id: "g3flash"

export:
  enabled: false
  mode: "annotated"
  clips_dirname: "clips"
  manifest_name: "manifest.json"
  annotated_dirname: "exports"
  annotated_name: "annotated.mp4"
  subtitles:
    enabled: true
    language: "zh"
    position: "top_right"
    font_file: ""
    font_size: 28

server:
  host: "0.0.0.0"
  port: 8099
  max_queue: 32
  inflight_timeout_sec: 300.0
  max_retries_per_job: 50
  max_empty_retries_per_job: 0
  auto_exit_after_all_done: true

worker:
  count: 4
  server_url: "http://127.0.0.1:8099"
  backend: "gemini"
  gemini:
    api_key: "sk-VrCRs8peG7yDlOZrap08Z5HvhZBO9xDho9l6MZCasphj8wJC"
    model: "gemini-3-flash-preview"
    api_mode: "openai_compatible"
    base_url: "https://api.duckcoding.ai"
    timeout_sec: 60.0
    max_output_tokens: 2048
    jpeg_quality: 85

windowing:
  window_sec: 12.0
  step_sec: 6.0
  frames_per_window: 128
  window_repeat_count: 2
  boundary_prompt_mode: "freeform"
  segment_labeling_mode: "inline"
  enable_refinement_pass: false
  enable_boundary_refinement: false
  boundary_refinement_window_sec: 4.0
  boundary_refinement_frames_per_window: 0
  boundary_refinement_abstain_merge_max_support: -1.0
  refinement_frames_per_window: 0
  target_width: 720
  target_height: 480
  png_compression: 0
  use_contact_sheets: true
  contact_sheet_rows: 4
  contact_sheet_cols: 4
  adaptive_merge_guard: true
  adaptive_merge_min_segments: 8
  adaptive_merge_collapse_ratio: 0.6
  boundary_support_threshold: 0.9
  refine_final_instructions: true

llm_merge:
  enabled: true
  backend: "openai"
  api_key: "sk-f139c6a699508c1c1d98ae9c26279c2860aa58e079fca9a93eea44afcda74615"
  model: "gpt-5-mini"
  base_url: "https://sub.alpen-y.top/v1"
  timeout_sec: 60.0
  organization: ""
  project: ""
  reasoning_effort: "low"
  max_output_tokens: 2048
  max_attempts: 3
  granularity: "coarse"
  min_input_segments: 12
  max_input_segments: 256
  min_output_ratio: 0.35
  coarse_min_output_ratio: 0.1
  coarse_max_supported_anchors_per_range: 1
  coarse_anchor_min_spacing_segments: 3
  coarse_anchor_min_side_segments: 2
  coarse_anchor_min_score: 1.03
  protect_supported_boundaries: true
  protected_boundary_support_threshold: 0.8
  protect_distinct_sequence_markers: true
  protect_instruction_drift: true
  protect_duplicate_tail_anchor: false
  duplicate_tail_anchor_min_frames: 5

progress:
  total_override: 0

logging:
  level: "DEBUG"
