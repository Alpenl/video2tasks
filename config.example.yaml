# Minimal runnable Video2Tasks config template.
# Precedence: environment variables > this YAML file > built-in defaults.
# Secrets should come from environment variables, not tracked YAML files.
#
# Deployment contract: single-machine shared-fs.
# Run the server and workers on the same machine (or the same mounted container volume) so local paths are identical.
# This example is intentionally minimal; it is not a full catalog of tuning knobs.
# Frozen operator semantics:
# - .DONE means all required stages for current config are complete.
# - Resume refuses cross config/prompt/backend identity by default unless force_resume=true.

datasets:
  - root: "./data"
    subset: "demo"

run:
  base_dir: "./runs"
  run_id: "demo"
  force_resume: false

server:
  host: "0.0.0.0"
  port: 8099
  max_empty_retries_per_job: 3

worker:
  count: 1
  server_url: "http://127.0.0.1:8099"
  backend: "dummy"

logging:
  level: "INFO"
