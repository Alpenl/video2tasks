# Video2Tasks config for comparing against segann on the same Breakfast sample
# via the working sub2api Responses-compatible endpoint.

datasets:
  - root: "/home/alpen/DEV/video2tasks/data"
    subset: "breakfast_p18_juice"

run:
  base_dir: "/home/alpen/DEV/video2tasks/runs"
  run_id: "breakfast-p18-juice-openai-sub2api"

server:
  host: "127.0.0.1"
  port: 8101
  max_queue: 32
  inflight_timeout_sec: 300.0
  max_retries_per_job: 5
  auto_exit_after_all_done: true

worker:
  server_url: "http://127.0.0.1:8101"
  backend: "openai"

  qwen3vl:
    model_path: "/path/to/Qwen3-VL-32B-Instruct"
    device_map: "balanced"

  remote_api:
    api_url: "http://127.0.0.1:8080/infer"
    api_key: ""
    timeout_sec: 60.0
    headers: {}

  openai:
    api_key: ""
    model: "gpt-5.4"
    base_url: "https://sub.alpen-y.top"
    timeout_sec: 60.0
    organization: ""
    project: ""
    reasoning_effort: "low"
    max_output_tokens: 512
    jpeg_quality: 85

windowing:
  window_sec: 12.0
  step_sec: 6.0
  frames_per_window: 24
  target_width: 720
  target_height: 480
  png_compression: 0

progress:
  total_override: 0

logging:
  level: "INFO"
