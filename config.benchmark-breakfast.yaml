# Video2Tasks — Breakfast-Actions benchmark configuration
datasets:
  - root: "./data"
    subset: "breakfast_benchmark"

run:
  base_dir: "./runs"
  run_id: "benchmark-breakfast-v2tasks"

server:
  host: "0.0.0.0"
  port: 8098
  max_queue: 32
  inflight_timeout_sec: 300.0
  max_retries_per_job: 5
  auto_exit_after_all_done: true

worker:
  server_url: "http://127.0.0.1:8098"
  backend: "openai"

  openai:
    api_key: "sk-f139c6a699508c1c1d98ae9c26279c2860aa58e079fca9a93eea44afcda74615"
    model: "gpt-5.2"
    base_url: "https://sub.alpen-y.top/v1"
    timeout_sec: 60.0
    organization: ""
    project: ""
    reasoning_effort: "low"
    max_output_tokens: 512
    jpeg_quality: 85

windowing:
  window_sec: 12.0
  step_sec: 6.0
  frames_per_window: 24
  target_width: 720
  target_height: 480
  png_compression: 0

progress:
  total_override: 0

logging:
  level: "INFO"
