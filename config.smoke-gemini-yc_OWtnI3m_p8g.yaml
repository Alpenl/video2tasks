# Video2Tasks Gemini smoke-test configuration for a single YouCook2 sample

datasets:
  - root: "./data"
    subset: "youcook2_single_OWtnI3m_p8g"

run:
  base_dir: "./runs"
  run_id: "gemini-smoke-yc_OWtnI3m_p8g"

server:
  host: "0.0.0.0"
  port: 8102
  max_queue: 32
  inflight_timeout_sec: 300.0
  max_retries_per_job: 3
  auto_exit_after_all_done: true

worker:
  server_url: "http://127.0.0.1:8102"
  backend: "gemini"

  qwen3vl:
    model_path: "/path/to/Qwen3-VL-32B-Instruct"
    device_map: "balanced"

  remote_api:
    api_url: "http://127.0.0.1:8080/infer"
    api_key: ""
    timeout_sec: 60.0
    headers: {}

  openai:
    api_key: ""
    model: "gpt-5.2"
    base_url: "https://api.openai.com/v1"
    timeout_sec: 60.0
    organization: ""
    project: ""
    reasoning_effort: "low"
    max_output_tokens: 512
    jpeg_quality: 85

  gemini:
    api_key: "sk-7L570s6JGogUxnINA4CaB1F2B0414212Bd9506055259C6D2"
    model: "gemini-2.5-pro"
    api_mode: "openai_compatible"
    base_url: "https://api.laozhang.ai/v1"
    timeout_sec: 60.0
    max_output_tokens: 2048
    jpeg_quality: 60

windowing:
  window_sec: 12.0
  step_sec: 6.0
  frames_per_window: 8
  target_width: 320
  target_height: 240
  png_compression: 0

progress:
  total_override: 1

logging:
  level: "INFO"
